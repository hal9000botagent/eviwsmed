<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wirbelsäule mit Abnutzung/Verschleiß -->
  <g stroke="#6B1D2A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wirbel 1 (oben) -->
    <rect x="14" y="6" width="12" height="4" rx="1" fill="none"/>
    
    <!-- Bandscheibe 1 mit Verschleiß (gestrichelt) -->
    <line x1="16" y1="11" x2="24" y2="11" stroke-dasharray="2,2" opacity="0.6"/>
    
    <!-- Wirbel 2 (leicht versetzt - Instabilität) -->
    <rect x="15" y="12" width="12" height="4" rx="1" fill="none"/>
    
    <!-- Bandscheibe 2 mit Verschleiß -->
    <line x1="16" y1="17" x2="24" y2="17" stroke-dasharray="2,2" opacity="0.6"/>
    
    <!-- Wirbel 3 (noch mehr versetzt) -->
    <rect x="13" y="18" width="12" height="4" rx="1" fill="none"/>
    
    <!-- Bandscheibe 3 mit Verschleiß -->
    <line x1="16" y1="23" x2="24" y2="23" stroke-dasharray="2,2" opacity="0.6"/>
    
    <!-- Wirbel 4 (unten) -->
    <rect x="14" y="24" width="12" height="4" rx="1" fill="none"/>
    
    <!-- Verschleiß-Markierungen (kleine Risse) -->
    <path d="M 18 13 L 19 14" opacity="0.5"/>
    <path d="M 21 13 L 22 14" opacity="0.5"/>
    <path d="M 17 19 L 18 20" opacity="0.5"/>
    <path d="M 23 19 L 24 20" opacity="0.5"/>
    
    <!-- Seitliche Abnutzungs-Indikatoren -->
    <circle cx="13" cy="14" r="1.5" fill="none" opacity="0.4"/>
    <circle cx="27" cy="20" r="1.5" fill="none" opacity="0.4"/>
  </g>
</svg>
