<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wirbelsäule mit Bruch/Blitz -->
  <g stroke="#6B1D2A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wirbel 1 (intakt oben) -->
    <rect x="15" y="6" width="10" height="4" rx="1" fill="none"/>
    
    <!-- Bandscheibe 1 -->
    <line x1="16" y1="11" x2="24" y2="11" opacity="0.5"/>
    
    <!-- Wirbel 2 (oberer Teil des Bruchs) -->
    <path d="M 15 12 L 25 12 L 25 14 L 21 14" fill="none"/>
    
    <!-- Bruchlinie (Zick-Zack) -->
    <path d="M 21 14 L 22 15 L 20 16 L 21 17" stroke-width="2"/>
    
    <!-- Wirbel 2 (unterer Teil des Bruchs, versetzt) -->
    <path d="M 19 17 L 14 17 L 14 19 L 24 19" fill="none"/>
    
    <!-- Bandscheibe 2 -->
    <line x1="16" y1="20" x2="24" y2="20" opacity="0.5"/>
    
    <!-- Wirbel 3 (intakt unten) -->
    <rect x="15" y="21" width="10" height="4" rx="1" fill="none"/>
    
    <!-- Trauma-Blitz (stilisiert) -->
    <path d="M 29 8 L 26 14 L 28 14 L 25 20" stroke-width="2" stroke="#6B1D2A" fill="none" opacity="0.6"/>
    
    <!-- Bruch-Indikator Pfeile -->
    <path d="M 10 15 L 12 15" opacity="0.5"/>
    <path d="M 28 15 L 30 15" opacity="0.5"/>
  </g>
</svg>
