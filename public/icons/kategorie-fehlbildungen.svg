<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wirbelsäule mit Krümmung (Skoliose) -->
  <g stroke="#6B1D2A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wirbel 1 (oben, leicht nach links) -->
    <rect x="16" y="6" width="10" height="3" rx="1" fill="none"/>
    
    <!-- Bandscheibe 1 (gekrümmt) -->
    <path d="M 17 10 Q 19 10.5 21 10" opacity="0.5"/>
    
    <!-- Wirbel 2 (mehr nach links) -->
    <rect x="14" y="11" width="10" height="3" rx="1" fill="none"/>
    
    <!-- Bandscheibe 2 (gekrümmt) -->
    <path d="M 15 15 Q 17 15.5 19 15" opacity="0.5"/>
    
    <!-- Wirbel 3 (am weitesten links - Apex der Krümmung) -->
    <rect x="12" y="16" width="10" height="3" rx="1" fill="none"/>
    
    <!-- Bandscheibe 3 (gekrümmt zurück) -->
    <path d="M 13 20 Q 15 20.5 17 20" opacity="0.5"/>
    
    <!-- Wirbel 4 (zurück zur Mitte) -->
    <rect x="14" y="21" width="10" height="3" rx="1" fill="none"/>
    
    <!-- Bandscheibe 4 -->
    <path d="M 15 25 Q 17 25.5 19 25" opacity="0.5"/>
    
    <!-- Wirbel 5 (unten, wieder zentrierter) -->
    <rect x="16" y="26" width="10" height="3" rx="1" fill="none"/>
    
    <!-- Krümmungs-Achse (gestrichelte Linie rechts) -->
    <line x1="28" y1="8" x2="28" y2="28" stroke-dasharray="2,2" opacity="0.4"/>
    
    <!-- Mess-Winkel (Cobb-Winkel Andeutung) -->
    <path d="M 26 12 L 28 12 L 28 18" opacity="0.5" stroke-width="1.2"/>
    <path d="M 27 12 L 27 13" opacity="0.5" stroke-width="1.2"/>
    
    <!-- Abweichungs-Pfeile -->
    <path d="M 11 17 L 9 17" opacity="0.5"/>
    <path d="M 10 16 L 9 17 L 10 18" opacity="0.5"/>
  </g>
</svg>
